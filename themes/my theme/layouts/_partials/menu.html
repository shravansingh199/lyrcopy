{{- $page := .page }}
{{- with index site.Menus .menuID }}

<nav class="main-nav">

    <button class="menu-toggle" aria-label="Toggle Menu">
        ☰
    </button>

    <div class="menu-items">
        {{- range . }}
            <a
                href="{{ .URL }}"
                class="{{ if $page.IsMenuCurrent .Menu . }}active{{ end }}"
            >
                {{ .Name }}
            </a>
        {{- end }}
    </div>

</nav>

{{- end }}
