{{ define "main" }}

  {{ .Content }}

  {{ $paginator := .Paginate (sort .Pages "Title") }}

  {{ range $paginator.Pages }}

    <section class="taxonomy-item">
      <h2 class="taxonomy-title">
        <a href="{{ .RelPermalink }}">{{ .Data.Term }}</a>
      </h2>
    </section>

  {{ end }}

  {{ partial "pagination.html" . }}

{{ end }}
